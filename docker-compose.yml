services:
  db:
    image: postgres:16-alpine
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./packages/backend
    container_name: erp_backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://erp_user:erp_password@db:5432/erp}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      EXPOSE_2FA_CODE: ${EXPOSE_2FA_CODE:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-cyfziykgwpgrpmqc}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      TWO_FACTOR_EMAIL_OVERRIDE: ${TWO_FACTOR_EMAIL_OVERRIDE:-}
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
    command: sh -lc "bun install && bun run db:migrate && bun run dev"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./packages/frontend
    container_name: erp_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    command: sh -lc "bun install && bun run dev"
    depends_on:
      - backend

volumes:
  postgres_data:
