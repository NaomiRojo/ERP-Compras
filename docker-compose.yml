services:
  db:
    image: postgres:16-alpine
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/backend/src/infrastructure/persistence/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./packages/backend
    container_name: erp_backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EXPOSE_2FA_CODE: ${EXPOSE_2FA_CODE}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      TWO_FACTOR_EMAIL_OVERRIDE: ${TWO_FACTOR_EMAIL_OVERRIDE}
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
    command: sh -lc "bun install && bun run dev"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./packages/frontend
    container_name: erp_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    command: sh -lc "bun install && bun run dev"
    depends_on:
      - backend

volumes:
  postgres_data:
