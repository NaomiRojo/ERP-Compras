trigger:
  branches:
    include:
      - prueba
      - main
      - proyecto_limpio

pr:
  branches:
    include:
      - main
      - prueba

variables:
  - group: erp-secret

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0

  - script: |
      set -e
      curl -fsSL https://bun.sh/install | bash
      echo "##vso[task.prependpath]$HOME/.bun/bin"
      bun --version
    displayName: Instalar Bun

  - script: |
      set -e
      bun install
    displayName: Instalar dependencias

  - script: |
      set -e
      cd packages/backend
      bunx tsc --noEmit -p tsconfig.json
      bun test
    displayName: Backend - typecheck + tests

  - script: |
      set -e
      cd packages/frontend
      bun run typecheck
      bun test
      bun run build
    displayName: Frontend - typecheck + tests + build

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'packages/frontend/dist'
      artifact: 'frontend-dist'
      publishLocation: 'pipeline'
    displayName: Publicar artefacto frontend

  - script: |
      set -e
      if [ "$BUILD_SOURCEBRANCH" = "refs/heads/prueba" ] || [ "$BUILD_SOURCEBRANCH" = "refs/heads/main" ]; then
        if [ -z "${COMPRAS_TOKEN:-}" ]; then
          echo "##vso[task.logissue type=error]Falta el secreto 'compras' para desplegar frontend."
          exit 1
        fi
        echo "Secreto de despliegue disponible."
      else
        echo "Rama sin despliegue, validacion de secreto omitida."
      fi
    displayName: Validar secreto compras
    env:
      COMPRAS_TOKEN: $(compras)

  - task: AzureStaticWebApp@0
    displayName: Desplegar frontend a Azure Static Web Apps
    condition: and(succeeded(), ne(variables['compras'], ''), or(eq(variables['Build.SourceBranch'], 'refs/heads/prueba'), eq(variables['Build.SourceBranch'], 'refs/heads/main')))
    inputs:
      workingDirectory: '$(System.DefaultWorkingDirectory)/packages/frontend'
      app_location: 'dist'
      output_location: ''
      skip_app_build: true
      skip_api_build: true
      azure_static_web_apps_api_token: $(compras)
