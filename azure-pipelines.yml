trigger:
  branches:
    include:
      - prueba
      - main
      - proyecto_limpio

pr:
  branches:
    include:
      - main
      - prueba

variables:
  - group: erp-secret

pool:
  name: PC-naomi

steps:
  - checkout: self
    fetchDepth: 0

  - task: PowerShell@2
    displayName: Instalar Bun
    inputs:
      targetType: inline
      script: |
        $ErrorActionPreference = "Stop"
        $bunBin = $null
        $bunExe = $null
        $bunCmd = Get-Command bun -ErrorAction SilentlyContinue
        if ($bunCmd) {
          $bunBin = Split-Path -Parent $bunCmd.Source
          $bunExe = $bunCmd.Source
        } else {
          $bunRoot = Join-Path $env:AGENT_TEMPDIRECTORY "bun-portable"
          $bunZip = Join-Path $env:AGENT_TEMPDIRECTORY "bun-windows-x64.zip"
          $bunBin = Join-Path $bunRoot "bun-windows-x64"
          $bunExe = Join-Path $bunBin "bun.exe"

          if (-not (Test-Path $bunExe)) {
            Write-Host "Bun no encontrado en PATH. Descargando binario portable..."
            if (Test-Path $bunRoot) { Remove-Item -Recurse -Force $bunRoot }
            Invoke-WebRequest -Uri "https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64.zip" -OutFile $bunZip
            Expand-Archive -Path $bunZip -DestinationPath $bunRoot -Force
          }
        }

        if (-not (Test-Path $bunExe)) {
          throw "No se pudo preparar Bun en el agente."
        }

        $env:PATH = "$bunBin;$env:PATH"
        Write-Host "##vso[task.prependpath]$bunBin"
        & $bunExe --version

  - task: PowerShell@2
    displayName: Instalar dependencias
    inputs:
      targetType: inline
      script: |
        $ErrorActionPreference = "Stop"
        bun install

  - task: PowerShell@2
    displayName: Backend - typecheck + tests
    condition: and(succeeded(), ne(variables['Build.SourceBranch'], 'refs/heads/prueba'))
    inputs:
      targetType: inline
      script: |
        $ErrorActionPreference = "Stop"
        Push-Location packages/backend
        bunx tsc --noEmit -p tsconfig.json
        bun test
        Pop-Location

  - task: PowerShell@2
    displayName: Frontend - typecheck + tests + build
    inputs:
      targetType: inline
      script: |
        $ErrorActionPreference = "Stop"
        Push-Location packages/frontend
        bun run typecheck
        if ($env:BUILD_SOURCEBRANCH -eq "refs/heads/prueba") {
          bun run test:smoke
        } else {
          bun test
        }
        bun run build
        Pop-Location

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'packages/frontend/dist'
      artifact: 'frontend-dist'
      publishLocation: 'pipeline'
    displayName: Publicar artefacto frontend

  - task: PowerShell@2
    displayName: Validar secreto compras
    env:
      COMPRAS_TOKEN: $(compras)
    inputs:
      targetType: inline
      script: |
        $ErrorActionPreference = "Stop"
        $deployBranch = $env:BUILD_SOURCEBRANCH -eq "refs/heads/prueba" -or $env:BUILD_SOURCEBRANCH -eq "refs/heads/main"
        if ($deployBranch) {
          if ([string]::IsNullOrWhiteSpace($env:COMPRAS_TOKEN)) {
            Write-Host "##vso[task.logissue type=error]Falta el secreto 'compras' para desplegar frontend."
            exit 1
          }
          Write-Host "Secreto de despliegue disponible."
        } else {
          Write-Host "Rama sin despliegue, validacion de secreto omitida."
        }

  - task: AzureStaticWebApp@0
    displayName: Desplegar frontend a Azure Static Web Apps
    condition: and(succeeded(), ne(variables['compras'], ''), or(eq(variables['Build.SourceBranch'], 'refs/heads/prueba'), eq(variables['Build.SourceBranch'], 'refs/heads/main')))
    inputs:
      workingDirectory: '$(System.DefaultWorkingDirectory)/packages/frontend'
      app_location: 'dist'
      output_location: ''
      skip_app_build: true
      skip_api_build: true
      azure_static_web_apps_api_token: $(compras)
